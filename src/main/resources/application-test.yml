spring:
  datasource:
    url: jdbc:h2:mem:expensetracker;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none

logging:
  level:
    root: WARN
    org.springframework.security: DEBUG

jwt:
  secret: some-test-secret-value-that-is-long-enough
  expiration-ms: 3600000
